name: TrustLayer CI

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: trustlayer-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  spec-coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check spec coverage for modified scopes
        run: |
          # Get changed source files (not tests, not specs)
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(src|app|lib|pages|components)/' || true)

          if [ -z "$CHANGED" ]; then
            echo "No source changes detected, skipping spec check"
            exit 0
          fi

          # Extract unique scopes from changed paths
          SCOPES=$(echo "$CHANGED" | sed 's|^[^/]*/||' | cut -d'/' -f1 | sort -u)

          MISSING=""
          for scope in $SCOPES; do
            # Check if a spec exists for this scope
            if ! ls specs/*${scope}*.feature 2>/dev/null | head -1 > /dev/null; then
              # Check broader — maybe it's in evals
              if ! ls specs/evals/*${scope}*.eval.yaml 2>/dev/null | head -1 > /dev/null; then
                MISSING="$MISSING\n  - $scope (no spec found)"
              fi
            else
              # Spec exists — check if human_reviewed
              EVAL_FILE=$(ls specs/evals/*${scope}*.eval.yaml 2>/dev/null | head -1)
              if [ -n "$EVAL_FILE" ]; then
                REVIEWED=$(grep 'human_reviewed:' "$EVAL_FILE" | head -1 | grep -c 'true' || true)
                if [ "$REVIEWED" -eq 0 ]; then
                  MISSING="$MISSING\n  - $scope (spec exists but not reviewed — run /spec-freeze)"
                fi
              fi
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Missing or unapproved specs for modified scopes:$MISSING"
            echo ""
            echo "Run /spec-freeze in Claude Code to generate specs for these scopes."
            exit 1
          fi

          echo "All modified scopes have approved specs."

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun test tests/spec-generated/ || true

  red-team-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run red-team tests (informational)
        run: |
          if [ -d "tests/red-team" ] && [ "$(ls tests/red-team/ 2>/dev/null)" ]; then
            bun test tests/red-team/ 2>&1 | tee /tmp/redteam.txt || true
            echo "## Red Team Results" >> $GITHUB_STEP_SUMMARY
            tail -20 /tmp/redteam.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No red-team tests found."
          fi

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run build
      - name: Run E2E tests
        run: |
          if ls tests/spec-generated/**/e2e/*.test.* 2>/dev/null | head -1 > /dev/null; then
            bunx playwright test tests/spec-generated/**/e2e/
          else
            echo "No E2E tests found."
          fi
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  pr-summary:
    runs-on: ubuntu-latest
    needs: [spec-coverage-gate, unit-tests, red-team-tests, e2e-tests]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post TrustLayer summary
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## TrustLayer CI Results

            | Check | Status |
            |-------|--------|
            | Spec Coverage | ${{ needs.spec-coverage-gate.result }} |
            | Unit Tests | ${{ needs.unit-tests.result }} |
            | Red Team | ${{ needs.red-team-tests.result }} |
            | E2E Tests | ${{ needs.e2e-tests.result }} |

            _Generated by [TrustLayer](https://github.com/hammashamzah/trustlayer)_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
