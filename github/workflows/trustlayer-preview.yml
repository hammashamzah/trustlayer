name: TrustLayer Preview Deploy

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

jobs:
  preview-deploy:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Deploy to Vercel Preview
        id: deploy-vercel
        if: hashFiles('vercel.json') != ''
        run: |
          bunx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}
          URL=$(bunx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Netlify Preview
        id: deploy-netlify
        if: hashFiles('netlify.toml') != ''
        run: |
          URL=$(bunx netlify deploy --dir=.next --json 2>/dev/null | jq -r '.deploy_url' || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Set preview URL
        id: deploy
        run: |
          URL="${{ steps.deploy-vercel.outputs.url }}${{ steps.deploy-netlify.outputs.url }}"
          echo "url=$URL" >> $GITHUB_OUTPUT

  playwright-on-preview:
    runs-on: ubuntu-latest
    needs: preview-deploy
    if: needs.preview-deploy.outputs.preview_url != ''
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      - name: Run E2E against preview
        run: |
          if ls tests/spec-generated/**/e2e/*.test.* 2>/dev/null | head -1 > /dev/null; then
            bunx playwright test tests/spec-generated/**/e2e/ --trace on --video on
          fi
        env:
          BASE_URL: ${{ needs.preview-deploy.outputs.preview_url }}
          CI: true
        continue-on-error: true

      - name: Upload recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-recordings-pr-${{ github.event.pull_request.number }}
          path: test-results/

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## TrustLayer Preview

            **URL:** ${{ needs.preview-deploy.outputs.preview_url }}
            **E2E Tests:** ${{ job.status }}
            **Recordings:** [View in Actions](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            _Generated by TrustLayer Preview_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
